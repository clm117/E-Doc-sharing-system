<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加文件 - 后台管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }
        
        .file-upload {
            border: 2px dashed #007bff;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background-color: #f8f9fa;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }
        
        .file-upload:hover {
            background-color: #e9ecef;
            border-color: #0056b3;
        }
        
        .file-upload input[type="file"] {
            display: none;
        }
        
        .file-upload label {
            display: inline-block;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }
        
        .file-upload label:hover {
            background-color: #0056b3;
        }
        
        .file-info {
            margin-top: 15px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 6px;
            display: none;
            text-align: left;
        }
        
        .file-info strong {
            color: #2c3e50;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-success {
            background-color: #28a745;
        }
        
        .btn-success:hover {
            background-color: #218838;
        }
        
        .btn-secondary {
            background-color: #6c757d;
        }
        
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        
        .back-link {
            display: inline-block;
            color: #007bff;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 500;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: auto;
            }
            
            .container {
                padding: 15px;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>添加文件</h1>
        </div>
        
        <div class="form-container">
            <div id="message" class="message"></div>
            
            <form id="fileForm">
                <div class="file-upload">
                    <input type="file" id="fileInput" accept=".pdf,.zip,.rar,.7z,.txt">
                    <label for="fileInput">选择文件</label>
                    <div id="fileInfo" class="file-info"></div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="file_path">文件路径：</label>
                        <input type="text" id="file_path" name="file_path" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="file_name">文件名称：</label>
                        <input type="text" id="file_name" name="file_name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="file_author">作者：</label>
                        <input type="text" id="file_author" name="file_author">
                    </div>
                    
                    <div class="form-group">
                        <label for="standard_name">标准化文件名：</label>
                        <input type="text" id="standard_name" name="standard_name">
                    </div>
                    
                    <div class="form-group">
                        <label for="file_tags">标签：</label>
                        <input type="text" id="file_tags" name="file_tags">
                    </div>
                    
                    <div class="form-group">
                        <label for="file_isbn">ISBN号：</label>
                        <input type="text" id="file_isbn" name="file_isbn">
                    </div>
                    
                    <div class="form-group">
                        <label for="file_price_type">价格类型：</label>
                        <select id="file_price_type" name="file_price_type">
                            <option value="1">标准版（¥3.00）</option>
                            <option value="2">高级版（¥5.00）</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="file_password">文件密码：</label>
                        <input type="text" id="file_password" name="file_password" placeholder="用于加密文件">
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="search_keywords">搜索关键字：</label>
                        <textarea id="search_keywords" name="search_keywords"></textarea>
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-success" onclick="encryptAndCompress()">加密并压缩</button>
                    <button type="button" class="btn" onclick="saveFile()">保存到数据库</button>
                    <a href="/admin" class="btn btn-secondary">返回</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('file_name').value = file.name;
                document.getElementById('file_path').value = file.path || file.name;
                
                const fileInfo = document.getElementById('fileInfo');
                fileInfo.style.display = 'block';
                fileInfo.innerHTML = `
                    <strong>文件名：</strong> ${file.name}<br>
                    <strong>文件大小：</strong> ${(file.size / 1024).toFixed(2)} KB<br>
                    <strong>文件类型：</strong> ${file.type || '未知'}
                `;
            }
        });
        
        function encryptAndCompress() {
            const fileInput = document.getElementById('fileInput');
            const filePassword = document.getElementById('file_password').value;
            
            if (!fileInput.files[0]) {
                showMessage('请先选择文件', 'error');
                return;
            }
            
            if (!filePassword) {
                showMessage('请输入文件密码', 'error');
                return;
            }
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('password', filePassword);
            
            fetch('/admin/encrypt_and_compress', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage(data.message, 'success');
                    fileInput.value = '';
                    document.getElementById('fileInfo').style.display = 'none';
                } else {
                    showMessage(data.message, 'error');
                }
            })
            .catch(error => {
                showMessage('加密压缩失败: ' + error.message, 'error');
            });
        }
        
        function saveFile() {
            const form = document.getElementById('fileForm');
            const formData = new FormData(form);
            
            fetch('/admin/add_file', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage(data.message, 'success');
                    form.reset();
                } else {
                    showMessage(data.message, 'error');
                }
            })
            .catch(error => {
                showMessage('保存失败: ' + error.message, 'error');
            });
        }
        
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
