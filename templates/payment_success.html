<!DOCTYPE html>
<!-- HTML5文档声明 -->
<html lang="zh-CN">
<!-- 根标签，设置语言为中文 -->
<head>
    <!-- 元标签：设置字符编码为UTF-8 -->
    <meta charset="UTF-8">
    <!-- 元标签：设置视口，适配移动设备 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 元标签：设置IE浏览器渲染模式，优先使用最新版本或Chrome内核 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <!-- 页面标题 -->
    <title>支付成功</title>
    <!-- CSS样式部分 -->
    <style type="text/css">
        /* 重置所有元素的默认样式 */
        * {
            margin: 0;        /* 清除外边距 */
            padding: 0;       /* 清除内边距 */
            box-sizing: border-box;  /* 使用border-box盒模型 */
        }
        
        /* 页面主体样式 */
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;  /* 设置字体，优先使用微软雅黑 */
            background-color: #ffffff;  /* 设置背景色为白色 */
            text-align: center;  /* 文本居中 */
            padding: 20px;  /* 设置内边距 */
            color: #333333;  /* 全局文字颜色 */
        }
        
        /* 容器样式 */
        .container {
            max-width: 600px;  /* 最大宽度 */
            margin: 0 auto;  /* 水平居中 */
            background-color: white;  /* 背景色 */
            padding: 20px;  /* 内边距 */
            text-align: left;  /* 文本左对齐 */
        }
        
        /* 标题样式 */
        h1 {
            color: #000000;  /* 文字颜色 */
            margin-bottom: 20px;  /* 底部外边距 */
            font-size: 28px;  /* 字体大小 */
            text-align: center;  /* 标题居中 */
            font-weight: bold;  /* 加粗 */
        }
        
        /* 支付说明文字样式 */
        .payment-info {
            font-size: 16px;  /* 字体大小 */
            margin-bottom: 20px;  /* 底部外边距 */
            line-height: 1.5;  /* 行高 */
        }
        
        /* 联系信息样式 */
        .contact-info {
            font-size: 16px;  /* 字体大小 */
            margin-bottom: 30px;  /* 底部外边距 */
            line-height: 1.5;  /* 行高 */
        }
        
        /* QQ号码样式 */
        .qq-number {
            color: #ff0000;  /* 红色QQ号码 */
            font-weight: bold;  /* 加粗 */
        }
        
        /* 支付成功信息样式 */
        .success-message {
            font-size: 16px;  /* 字体大小 */
            color: #52c41a;  /* 绿色成功提示 */
            margin-bottom: 20px;  /* 底部外边距 */
            text-align: center;  /* 居中显示 */
        }
        
        /* 密码区域样式 */
        .password-section {
            margin: 20px 0;
            padding: 20px;
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 5px;
        }
        
        /* 密码标签样式 */
        .password-label {
            font-size: 16px;
            color: #52c41a;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        /* 文件密码样式 */
        .file-password {
            font-size: 24px;
            font-weight: bold;
            color: #1677ff;
            letter-spacing: 2px;
            text-align: center;
            margin: 10px 0;
        }
        
        /* 文件信息样式 */
        .file-info {
            margin: 20px 0;
            padding: 15px;
            background-color: #f0f9ff;
            border: 1px solid #91d5ff;
            border-radius: 5px;
        }
        
        /* 文件信息项样式 */
        .file-info-item {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 8px 15px;
            font-size: 14px;
            color: #000000;
            background-color: #f0f0f0;
            border: 1px solid #cccccc;
            text-decoration: none;
            margin: 5px;
        }
        
        /* 按钮容器样式 */
        .btn-container {
            text-align: center;
            margin: 20px 0;
        }
        
        /* 提示信息样式 */
        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
            text-align: center;
        }
        
        /* IE浏览器兼容性处理 */
        @media screen and (-ms-high-contrast: active), (-ms-high-contrast: none) {
            .btn {
                padding: 10px 25px;  /* IE下的内边距 */
                font-size: 14px;  /* IE下的字体大小 */
            }
        }
    </style>
</head>
<body>
    <!-- 主要内容区域 -->
    <div class="container">
        <!-- 页面标题 -->
        <h1>支付成功！</h1>
        
        <!-- 成功提示信息 -->
        <p class="success-message">恭喜您已成功购买学习资料，以下是您的资料密码：</p>
        
        <!-- 文件信息 -->
        <div class="file-info">
            <div class="file-info-item">
                <strong>订单编号：</strong> {{ file_name }}
            </div>
            <div class="file-info-item">
                <strong>支付金额：</strong> ¥{{ amount|round(2) }}
            </div>
        </div>
        
        <!-- 密码区域 -->
        <div class="password-section">
            <div class="password-label">学习资料密码：</div>
            <div class="file-password">{{ file_password }}</div>
        </div>
        

        
        <!-- 提示信息 -->
        <div class="note">
            提示：请妥善保存您的密码，下载资料时需要使用。<br>
            如有疑问，请联系QQ <span class="qq-number">29344161</span>
        </div>
    </div>
</body>
</html>
